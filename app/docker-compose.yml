# Local dev stack. Ports bind to 127.0.0.1 only (loopback) — these services
# use weak dev credentials (masterKey / minioadmin) and must not be exposed to
# the LAN. The published ports let a web run on the host (`npm run dev`/`start`
# in app/web) reach the seeded stack:
#   MEILI_HOST=http://localhost:7700  MEILI_SEARCH_KEY=masterKey
#   NEXT_PUBLIC_IMAGE_BASE_URL=http://localhost:9000/card-images
# Note: these ports collide with the standalone test containers
# (revelio-testmeili:7700, revelio-testminio:9000) — stop those first.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: revelio
      POSTGRES_PASSWORD: revelio
      POSTGRES_DB: revelio
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revelio"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest:
    image: revelio-ingest:local
    build:
      context: .
      dockerfile: ingest/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://revelio:revelio@postgres:5432/revelio
      DATA_DIR: /data
      I18N_DIR: /i18n
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: masterKey
      ASSETS_DIR: /assets
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: card-images
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
    volumes:
      - ../card-data/dist:/data:ro
      - ../card-data/i18n:/i18n:ro
      - ../card-data/assets:/assets:ro
    restart: "no"

  migrate:
    image: revelio-ingest:local
    build:
      context: .
      dockerfile: ingest/Dockerfile
    profiles: ["tools"]          # not started by `up`; run via `docker compose run --rm migrate`
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://revelio:revelio@postgres:5432/revelio
    command: ["npx", "tsx", "db/src/migrate-cli.ts"]
    restart: "no"

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # web console
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: {}
  meili: {}
  minio: {}
