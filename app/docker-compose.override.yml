# Dev-only overrides (auto-merged by `docker compose`). NOT used in prod.
# Publishes the backing services on the host so a web run on the host
# (`npm run dev`/`start` in app/web) can reach the seeded compose stack:
#   MEILI_HOST=http://localhost:7700  MEILI_SEARCH_KEY=masterKey
#   NEXT_PUBLIC_IMAGE_BASE_URL=http://localhost:9000/card-images
# Note: these ports collide with the standalone test containers
# (revelio-testmeili:7700, revelio-testminio:9000) — stop those first.
services:
  postgres:
    ports:
      - "5432:5432"
  meilisearch:
    ports:
      - "7700:7700"
  minio:
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    volumes:
      - ../card-data/dist:/data:ro
      - ../card-data/i18n:/i18n:ro
      - ../card-data/assets:/assets:ro
  migrate:
    build:
      context: .
      dockerfile: ingest/Dockerfile
