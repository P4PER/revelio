name: Publish

# Runs only after a merge to main. Validation (check/test/build) already ran on
# the PR; branch protection requires those checks to pass and requires branches
# to be up to date before merging, so main's tree is identical to what was
# tested. We deliberately do NOT re-run validation here.
#
# Each image is built only when its inputs changed. Both images bundle the
# shared workspaces (core/db/search), so a change there rebuilds both.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      ingest: ${{ steps.filter.outputs.ingest }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `app/web/**` / `app/ingest/**` also cover each image's Dockerfile.
          filters: |
            shared: &shared
              - 'app/core/**'
              - 'app/db/**'
              - 'app/search/**'
              - 'app/package.json'
              - 'app/package-lock.json'
              - 'app/tsconfig.base.json'
            web:
              - *shared
              - 'app/web/**'
            ingest:
              - *shared
              - 'app/ingest/**'

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/revelio-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: app
          file: app/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_IMAGE_BASE_URL=${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-ingest:
    needs: changes
    if: needs.changes.outputs.ingest == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/revelio-ingest
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: app
          file: app/ingest/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ingest
          cache-to: type=gha,mode=max,scope=ingest
